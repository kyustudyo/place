<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Place - Neubrutalism</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Trebuchet MS', 'Arial Black', sans-serif;
    background: #FFF8E1;
    color: #1A1A1A;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #FF6B9D;
    border-bottom: 3px solid #1A1A1A;
    flex-shrink: 0;
    min-height: 60px;
  }
  .top-bar-left { display: flex; flex-direction: column; }
  .app-logo {
    font-size: 28px;
    font-weight: 900;
    color: #1A1A1A;
    text-transform: uppercase;
    letter-spacing: -1px;
  }
  .app-subtitle {
    font-size: 11px;
    color: #1A1A1A;
    font-weight: 700;
    letter-spacing: 1px;
    opacity: 0.7;
  }
  .top-bar-actions { display: flex; gap: 8px; }
  .btn-icon {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    border: 3px solid #1A1A1A;
    background: #FFE135;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #1A1A1A;
    font-size: 18px;
    font-weight: 900;
    min-width: 48px;
    min-height: 48px;
    box-shadow: 4px 4px 0 #1A1A1A;
    transition: all 0.1s;
  }
  .btn-icon:active {
    box-shadow: 1px 1px 0 #1A1A1A;
    transform: translate(3px, 3px);
  }

  .room-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-height: 0;
    overflow: hidden;
    background: #FFF8E1;
    position: relative;
  }
  /* Decorative dots */
  .room-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(#1A1A1A 1px, transparent 1px);
    background-size: 16px 16px;
    opacity: 0.05;
  }
  .isometric-room {
    width: 300px;
    height: 260px;
    position: relative;
    transform-style: preserve-3d;
  }
  .floor {
    position: absolute;
    width: 240px;
    height: 240px;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) rotateX(60deg) rotateZ(45deg);
    background:
      linear-gradient(#1A1A1A 2px, transparent 2px),
      linear-gradient(90deg, #1A1A1A 2px, transparent 2px);
    background-size: 30px 30px;
    background-color: #C8F7C5;
    border: 3px solid #1A1A1A;
  }
  .wall-back {
    position: absolute;
    width: 170px;
    height: 120px;
    top: 10px;
    left: 0;
    transform: skewY(-30deg);
    transform-origin: bottom left;
    background: #FFE135;
    border: 3px solid #1A1A1A;
    border-bottom: none;
  }
  .wall-back::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 8px,
        rgba(26,26,26,0.05) 8px,
        rgba(26,26,26,0.05) 10px
      );
  }
  .wall-right {
    position: absolute;
    width: 170px;
    height: 120px;
    top: 10px;
    right: 0;
    transform: skewY(30deg);
    transform-origin: bottom right;
    background: #A8E6CF;
    border: 3px solid #1A1A1A;
    border-bottom: none;
  }
  .wall-right::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 8px,
        rgba(26,26,26,0.05) 8px,
        rgba(26,26,26,0.05) 10px
      );
  }

  .placed-item {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 900;
    color: #1A1A1A;
    text-transform: uppercase;
  }
  .placed-sofa {
    width: 70px;
    height: 30px;
    background: #FF6B9D;
    border: 3px solid #1A1A1A;
    bottom: 70px;
    left: 70px;
    transform: rotateX(60deg) rotateZ(45deg);
  }
  .placed-table {
    width: 40px;
    height: 40px;
    background: #FFE135;
    border: 3px solid #1A1A1A;
    bottom: 85px;
    left: 155px;
    transform: rotateX(60deg) rotateZ(45deg);
  }

  .furniture-panel {
    background: #FFFFFF;
    border-top: 3px solid #1A1A1A;
    padding: 12px 16px;
    flex-shrink: 0;
    max-height: 224px;
    overflow-y: auto;
  }
  .panel-title {
    font-size: 14px;
    font-weight: 900;
    color: #1A1A1A;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
    background: #FFE135;
    display: inline-block;
    padding: 2px 8px;
    border: 2px solid #1A1A1A;
  }
  .furniture-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .furniture-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: #FFF8E1;
    border: 3px solid #1A1A1A;
    border-radius: 8px;
    min-height: 56px;
    box-shadow: 3px 3px 0 #1A1A1A;
  }
  .furniture-item:nth-child(even) { background: #E8F5E9; }
  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    flex-shrink: 0;
    border: 3px solid #1A1A1A;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 16px;
    font-weight: 900;
    color: #1A1A1A;
    text-transform: uppercase;
  }
  .item-size {
    font-size: 12px;
    color: #555;
    font-weight: 700;
    margin-top: 2px;
  }
  .item-actions { display: flex; gap: 6px; }
  .btn-sm {
    width: 38px;
    height: 38px;
    border-radius: 6px;
    border: 3px solid #1A1A1A;
    background: #B8F2E6;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: #1A1A1A;
    font-weight: 900;
    min-width: 38px;
    min-height: 38px;
    box-shadow: 2px 2px 0 #1A1A1A;
  }
  .btn-sm:active {
    box-shadow: 0 0 0 #1A1A1A;
    transform: translate(2px, 2px);
  }
  .btn-sm.btn-danger { background: #FF6B6B; }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: #1A1A1A;
    flex-shrink: 0;
    min-height: 48px;
  }
  .status-item {
    font-size: 13px;
    color: #FFE135;
    font-weight: 900;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #C8F7C5;
    border: 2px solid #FFE135;
  }
  .status-warning {
    color: #FF6B9D;
  }

  @media (min-width: 768px) {
    .main-content { display: flex; flex: 1; min-height: 0; }
    .room-container { flex: 1; }
    .furniture-panel {
      width: 360px;
      border-top: none;
      border-left: 3px solid #1A1A1A;
      max-height: none;
    }
  }
</style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="app-logo">Place</div>
      <div class="app-subtitle">가구 배치 도구</div>
    </div>
    <div class="top-bar-actions">
      <button class="btn-icon" aria-label="붙여넣기">📋</button>
      <button class="btn-icon" aria-label="JSON 복사">{ }</button>
    </div>
  </div>

  <div class="main-content">
    <div class="room-container">
      <div class="isometric-room">
        <div class="wall-back"></div>
        <div class="wall-right"></div>
        <div class="floor"></div>
        <div class="placed-item placed-sofa">소파</div>
        <div class="placed-item placed-table">탁자</div>
      </div>
    </div>

    <div class="furniture-panel">
      <div class="panel-title">가구 목록</div>
      <div class="furniture-list">
        <div class="furniture-item">
          <div class="color-swatch" style="background: #FF6B9D;"></div>
          <div class="item-info">
            <div class="item-name">소파</div>
            <div class="item-size">2.0 × 0.9 × 0.8m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm btn-danger" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #FFE135;"></div>
          <div class="item-info">
            <div class="item-name">테이블</div>
            <div class="item-size">1.5 × 0.6 × 1.0m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm btn-danger" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #A8E6CF;"></div>
          <div class="item-info">
            <div class="item-name">책장</div>
            <div class="item-size">0.8 × 0.3 × 1.8m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm btn-danger" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #74B9FF;"></div>
          <div class="item-info">
            <div class="item-name">의자</div>
            <div class="item-size">0.5 × 0.5 × 0.9m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm btn-danger" aria-label="삭제">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <span class="status-dot"></span>
      배치: 2/4
    </div>
    <div class="status-item status-warning">
      ⚠ 충돌 없음
    </div>
  </div>
</body>
</html>
