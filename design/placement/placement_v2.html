<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Place - Dark Neon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: #0F0F23;
    color: #E0E0FF;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Top Bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: #0A0A1A;
    border-bottom: 1px solid #1A1A3A;
    flex-shrink: 0;
    min-height: 56px;
  }
  .top-bar-left {
    display: flex;
    flex-direction: column;
  }
  .app-logo {
    font-size: 22px;
    font-weight: 800;
    color: #00FF88;
    text-shadow: 0 0 20px rgba(0, 255, 136, 0.5), 0 0 40px rgba(0, 255, 136, 0.2);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .app-subtitle {
    font-size: 10px;
    color: #4A4A8A;
    letter-spacing: 1px;
  }
  .top-bar-actions {
    display: flex;
    gap: 8px;
  }
  .btn-icon {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    border: 1px solid #1A1A3A;
    background: #12122A;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #00D4FF;
    font-size: 16px;
    min-width: 44px;
    min-height: 44px;
    transition: all 0.3s;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
  }
  .btn-icon:active {
    background: #1A1A3A;
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
  }

  /* Room View */
  .room-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }
  .room-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,212,255,0.05) 0%, transparent 70%);
  }
  .isometric-room {
    width: 300px;
    height: 260px;
    position: relative;
    transform-style: preserve-3d;
  }
  .floor {
    position: absolute;
    width: 240px;
    height: 240px;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) rotateX(60deg) rotateZ(45deg);
    background:
      linear-gradient(rgba(0, 212, 255, 0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.15) 1px, transparent 1px);
    background-size: 30px 30px;
    background-color: #0A0A1A;
    border: 1px solid rgba(0, 212, 255, 0.3);
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
  }
  .wall-back {
    position: absolute;
    width: 170px;
    height: 120px;
    top: 10px;
    left: 0;
    transform: skewY(-30deg);
    transform-origin: bottom left;
    background: linear-gradient(180deg, #0D0D20 0%, #0A0A18 100%);
    border: 1px solid rgba(0, 255, 136, 0.2);
    border-bottom: none;
  }
  .wall-back::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(0, 255, 136, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 136, 0.06) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  .wall-right {
    position: absolute;
    width: 170px;
    height: 120px;
    top: 10px;
    right: 0;
    transform: skewY(30deg);
    transform-origin: bottom right;
    background: linear-gradient(180deg, #0B0B1C 0%, #08081A 100%);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-bottom: none;
  }
  .wall-right::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(0, 212, 255, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.06) 1px, transparent 1px);
    background-size: 30px 30px;
  }

  .placed-item {
    position: absolute;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .placed-sofa {
    width: 70px;
    height: 30px;
    background: rgba(0, 212, 255, 0.25);
    border: 1px solid #00D4FF;
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.4), inset 0 0 10px rgba(0, 212, 255, 0.1);
    color: #00D4FF;
    bottom: 70px;
    left: 70px;
    transform: rotateX(60deg) rotateZ(45deg);
    text-shadow: 0 0 8px rgba(0, 212, 255, 0.8);
  }
  .placed-table {
    width: 40px;
    height: 40px;
    background: rgba(0, 255, 136, 0.2);
    border: 1px solid #00FF88;
    box-shadow: 0 0 15px rgba(0, 255, 136, 0.4), inset 0 0 10px rgba(0, 255, 136, 0.1);
    color: #00FF88;
    bottom: 85px;
    left: 155px;
    transform: rotateX(60deg) rotateZ(45deg);
    text-shadow: 0 0 8px rgba(0, 255, 136, 0.8);
  }

  /* Furniture Panel */
  .furniture-panel {
    background: #0A0A1A;
    border-top: 1px solid #1A1A3A;
    padding: 12px 16px;
    flex-shrink: 0;
    max-height: 220px;
    overflow-y: auto;
  }
  .panel-title {
    font-size: 11px;
    font-weight: 700;
    color: #00FF88;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
  }
  .furniture-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .furniture-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: #12122A;
    border-radius: 8px;
    border: 1px solid #1A1A3A;
    min-height: 56px;
    transition: border-color 0.3s;
  }
  .furniture-item:active {
    border-color: #00D4FF;
  }
  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    flex-shrink: 0;
    box-shadow: 0 0 12px currentColor;
  }
  .item-info {
    flex: 1;
    min-width: 0;
  }
  .item-name {
    font-size: 14px;
    font-weight: 700;
    color: #E0E0FF;
  }
  .item-size {
    font-size: 11px;
    color: #4A4A8A;
    margin-top: 2px;
    font-family: 'SF Mono', monospace;
  }
  .item-actions {
    display: flex;
    gap: 6px;
  }
  .btn-sm {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    border: 1px solid #1A1A3A;
    background: #0F0F23;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    color: #00D4FF;
    min-width: 36px;
    min-height: 36px;
  }
  .btn-sm:active { background: #1A1A3A; }

  /* Status Bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: #0A0A1A;
    border-top: 1px solid #1A1A3A;
    flex-shrink: 0;
    min-height: 44px;
  }
  .status-item {
    font-size: 11px;
    color: #4A4A8A;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'SF Mono', monospace;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00FF88;
    box-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
  }
  .status-warning {
    color: #FFD60A;
    text-shadow: 0 0 8px rgba(255, 214, 10, 0.3);
  }

  @media (min-width: 768px) {
    .main-content { display: flex; flex: 1; min-height: 0; }
    .room-container { flex: 1; }
    .furniture-panel {
      width: 340px;
      border-top: none;
      border-left: 1px solid #1A1A3A;
      max-height: none;
    }
  }
</style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="app-logo">Place</div>
      <div class="app-subtitle">가구 배치 도구</div>
    </div>
    <div class="top-bar-actions">
      <button class="btn-icon" aria-label="붙여넣기">📋</button>
      <button class="btn-icon" aria-label="JSON 복사">{ }</button>
    </div>
  </div>

  <div class="main-content">
    <div class="room-container">
      <div class="isometric-room">
        <div class="wall-back"></div>
        <div class="wall-right"></div>
        <div class="floor"></div>
        <div class="placed-item placed-sofa">소파</div>
        <div class="placed-item placed-table">탁자</div>
      </div>
    </div>

    <div class="furniture-panel">
      <div class="panel-title">가구 목록</div>
      <div class="furniture-list">
        <div class="furniture-item">
          <div class="color-swatch" style="background: #00D4FF; color: #00D4FF;"></div>
          <div class="item-info">
            <div class="item-name">소파</div>
            <div class="item-size">2.0 × 0.9 × 0.8m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #00FF88; color: #00FF88;"></div>
          <div class="item-info">
            <div class="item-name">테이블</div>
            <div class="item-size">1.5 × 0.6 × 1.0m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #BF5AF2; color: #BF5AF2;"></div>
          <div class="item-info">
            <div class="item-name">책장</div>
            <div class="item-size">0.8 × 0.3 × 1.8m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #FFD60A; color: #FFD60A;"></div>
          <div class="item-info">
            <div class="item-name">의자</div>
            <div class="item-size">0.5 × 0.5 × 0.9m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <span class="status-dot"></span>
      배치됨: 2 / 4
    </div>
    <div class="status-item status-warning">
      ⚠ 충돌 없음
    </div>
  </div>
</body>
</html>
