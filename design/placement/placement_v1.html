<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Place - Clean Minimal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAFAFA;
    color: #1D1D1F;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Top Bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: #FFFFFF;
    border-bottom: 0.5px solid #E5E5EA;
    flex-shrink: 0;
    min-height: 56px;
  }
  .top-bar-left {
    display: flex;
    flex-direction: column;
  }
  .app-logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #1D1D1F;
  }
  .app-subtitle {
    font-size: 11px;
    color: #86868B;
    font-weight: 400;
    letter-spacing: 0.2px;
  }
  .top-bar-actions {
    display: flex;
    gap: 8px;
  }
  .btn-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 0.5px solid #E5E5EA;
    background: #F5F5F7;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #1D1D1F;
    font-size: 16px;
    min-width: 40px;
    min-height: 40px;
    transition: background 0.2s;
  }
  .btn-icon:active { background: #E8E8ED; }

  /* Room View */
  .room-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-height: 0;
    overflow: hidden;
    background: #FAFAFA;
  }
  .isometric-room {
    width: 300px;
    height: 260px;
    position: relative;
    transform-style: preserve-3d;
  }
  /* Floor */
  .floor {
    position: absolute;
    width: 240px;
    height: 240px;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) rotateX(60deg) rotateZ(45deg);
    transform-origin: center center;
    background:
      linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    background-color: #F0F0F5;
    border: 0.5px solid #D2D2D7;
  }
  /* Back Wall */
  .wall-back {
    position: absolute;
    width: 170px;
    height: 120px;
    top: 10px;
    left: 0;
    transform: skewY(-30deg);
    transform-origin: bottom left;
    background: linear-gradient(180deg, #FFFFFF 0%, #F5F5F7 100%);
    border: 0.5px solid #D2D2D7;
    border-bottom: none;
  }
  .wall-back::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  /* Right Wall */
  .wall-right {
    position: absolute;
    width: 170px;
    height: 120px;
    top: 10px;
    right: 0;
    transform: skewY(30deg);
    transform-origin: bottom right;
    background: linear-gradient(180deg, #F5F5F7 0%, #EBEBF0 100%);
    border: 0.5px solid #D2D2D7;
    border-bottom: none;
  }
  .wall-right::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
    background-size: 30px 30px;
  }

  /* Placed Furniture */
  .placed-item {
    position: absolute;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 500;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .placed-sofa {
    width: 70px;
    height: 30px;
    background: rgba(0, 122, 255, 0.75);
    bottom: 70px;
    left: 70px;
    transform: rotateX(60deg) rotateZ(45deg);
    border: 1px solid rgba(0, 122, 255, 0.9);
  }
  .placed-table {
    width: 40px;
    height: 40px;
    background: rgba(52, 199, 89, 0.7);
    bottom: 85px;
    left: 155px;
    transform: rotateX(60deg) rotateZ(45deg);
    border: 1px solid rgba(52, 199, 89, 0.9);
  }

  /* Furniture Panel */
  .furniture-panel {
    background: #FFFFFF;
    border-top: 0.5px solid #E5E5EA;
    padding: 12px 16px;
    flex-shrink: 0;
    max-height: 220px;
    overflow-y: auto;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: #86868B;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .furniture-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .furniture-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: #F5F5F7;
    border-radius: 12px;
    min-height: 56px;
  }
  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .item-info {
    flex: 1;
    min-width: 0;
  }
  .item-name {
    font-size: 15px;
    font-weight: 600;
    color: #1D1D1F;
  }
  .item-size {
    font-size: 12px;
    color: #86868B;
    margin-top: 1px;
  }
  .item-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn-sm {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 0.5px solid #E5E5EA;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    color: #86868B;
    min-width: 36px;
    min-height: 36px;
    transition: background 0.15s;
  }
  .btn-sm:active { background: #F0F0F5; }

  /* Status Bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: #FFFFFF;
    border-top: 0.5px solid #E5E5EA;
    flex-shrink: 0;
    min-height: 44px;
  }
  .status-item {
    font-size: 12px;
    color: #86868B;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #34C759;
  }
  .status-warning {
    color: #FF9500;
  }

  /* Desktop */
  @media (min-width: 768px) {
    .main-content {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .room-container {
      flex: 1;
    }
    .furniture-panel {
      width: 320px;
      border-top: none;
      border-left: 0.5px solid #E5E5EA;
      max-height: none;
      overflow-y: auto;
    }
  }
</style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="app-logo">Place</div>
      <div class="app-subtitle">가구 배치 도구</div>
    </div>
    <div class="top-bar-actions">
      <button class="btn-icon" aria-label="붙여넣기">📋</button>
      <button class="btn-icon" aria-label="JSON 복사">{ }</button>
    </div>
  </div>

  <div class="main-content">
    <div class="room-container">
      <div class="isometric-room">
        <div class="wall-back"></div>
        <div class="wall-right"></div>
        <div class="floor"></div>
        <div class="placed-item placed-sofa">소파</div>
        <div class="placed-item placed-table">탁자</div>
      </div>
    </div>

    <div class="furniture-panel">
      <div class="panel-title">가구 목록</div>
      <div class="furniture-list">
        <div class="furniture-item">
          <div class="color-swatch" style="background: #007AFF;"></div>
          <div class="item-info">
            <div class="item-name">소파</div>
            <div class="item-size">2.0 × 0.9 × 0.8m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #34C759;"></div>
          <div class="item-info">
            <div class="item-name">테이블</div>
            <div class="item-size">1.5 × 0.6 × 1.0m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #AF52DE;"></div>
          <div class="item-info">
            <div class="item-name">책장</div>
            <div class="item-size">0.8 × 0.3 × 1.8m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #FF9500;"></div>
          <div class="item-info">
            <div class="item-name">의자</div>
            <div class="item-size">0.5 × 0.5 × 0.9m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <span class="status-dot"></span>
      배치됨: 2 / 4
    </div>
    <div class="status-item status-warning">
      ⚠ 충돌 없음
    </div>
  </div>
</body>
</html>
