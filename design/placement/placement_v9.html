<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Place - Monochrome Pro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Helvetica Neue', 'Inter', sans-serif;
    background: #FFFFFF;
    color: #000000;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: #000000;
    flex-shrink: 0;
    min-height: 56px;
  }
  .top-bar-left { display: flex; flex-direction: column; }
  .app-logo {
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  .app-subtitle {
    font-size: 10px;
    color: #666666;
    letter-spacing: 2px;
    font-weight: 400;
  }
  .top-bar-actions { display: flex; gap: 6px; }
  .btn-icon {
    width: 44px;
    height: 44px;
    border-radius: 0;
    border: 1px solid #333333;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #FFFFFF;
    font-size: 16px;
    min-width: 44px;
    min-height: 44px;
    transition: all 0.15s;
  }
  .btn-icon:active { background: #333333; }

  .room-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-height: 0;
    overflow: hidden;
    background: #FFFFFF;
  }
  .isometric-room {
    width: 300px;
    height: 260px;
    position: relative;
    transform-style: preserve-3d;
  }
  .floor {
    position: absolute;
    width: 240px;
    height: 240px;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) rotateX(60deg) rotateZ(45deg);
    background:
      linear-gradient(#E0E0E0 1px, transparent 1px),
      linear-gradient(90deg, #E0E0E0 1px, transparent 1px);
    background-size: 30px 30px;
    background-color: #FAFAFA;
    border: 1px solid #000000;
  }
  .wall-back {
    position: absolute;
    width: 170px;
    height: 120px;
    top: 10px;
    left: 0;
    transform: skewY(-30deg);
    transform-origin: bottom left;
    background: #F5F5F5;
    border: 1px solid #000000;
    border-bottom: none;
  }
  .wall-back::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(#E8E8E8 1px, transparent 1px),
      linear-gradient(90deg, #E8E8E8 1px, transparent 1px);
    background-size: 30px 30px;
  }
  .wall-right {
    position: absolute;
    width: 170px;
    height: 120px;
    top: 10px;
    right: 0;
    transform: skewY(30deg);
    transform-origin: bottom right;
    background: #EBEBEB;
    border: 1px solid #000000;
    border-bottom: none;
  }
  .wall-right::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(#DDDDDD 1px, transparent 1px),
      linear-gradient(90deg, #DDDDDD 1px, transparent 1px);
    background-size: 30px 30px;
  }

  .placed-item {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .placed-sofa {
    width: 70px;
    height: 30px;
    background: #000000;
    color: #FFFFFF;
    bottom: 70px;
    left: 70px;
    transform: rotateX(60deg) rotateZ(45deg);
  }
  .placed-table {
    width: 40px;
    height: 40px;
    background: #666666;
    color: #FFFFFF;
    bottom: 85px;
    left: 155px;
    transform: rotateX(60deg) rotateZ(45deg);
  }

  .furniture-panel {
    background: #FFFFFF;
    border-top: 1px solid #000000;
    padding: 14px 16px;
    flex-shrink: 0;
    max-height: 224px;
    overflow-y: auto;
  }
  .panel-title {
    font-size: 10px;
    font-weight: 700;
    color: #000000;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #000000;
  }
  .furniture-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .furniture-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid #E0E0E0;
    min-height: 56px;
  }
  .furniture-item:last-child { border-bottom: none; }
  .color-swatch {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14px;
    font-weight: 700;
    color: #000000;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .item-size {
    font-size: 12px;
    color: #888888;
    margin-top: 2px;
    font-weight: 400;
  }
  .item-actions { display: flex; gap: 4px; }
  .btn-sm {
    width: 36px;
    height: 36px;
    border: 1px solid #000000;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    color: #000000;
    min-width: 36px;
    min-height: 36px;
    transition: all 0.15s;
  }
  .btn-sm:active {
    background: #000000;
    color: #FFFFFF;
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: #000000;
    flex-shrink: 0;
    min-height: 44px;
  }
  .status-item {
    font-size: 11px;
    color: #FFFFFF;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #FFFFFF;
  }
  .status-warning { color: #999999; }

  @media (min-width: 768px) {
    .main-content { display: flex; flex: 1; min-height: 0; }
    .room-container { flex: 1; }
    .furniture-panel {
      width: 340px;
      border-top: none;
      border-left: 1px solid #000000;
      max-height: none;
      padding: 14px 20px;
    }
  }
</style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="app-logo">Place</div>
      <div class="app-subtitle">가구 배치 도구</div>
    </div>
    <div class="top-bar-actions">
      <button class="btn-icon" aria-label="붙여넣기">📋</button>
      <button class="btn-icon" aria-label="JSON 복사">{ }</button>
    </div>
  </div>

  <div class="main-content">
    <div class="room-container">
      <div class="isometric-room">
        <div class="wall-back"></div>
        <div class="wall-right"></div>
        <div class="floor"></div>
        <div class="placed-item placed-sofa">소파</div>
        <div class="placed-item placed-table">탁자</div>
      </div>
    </div>

    <div class="furniture-panel">
      <div class="panel-title">가구 목록</div>
      <div class="furniture-list">
        <div class="furniture-item">
          <div class="color-swatch" style="background: #000000;"></div>
          <div class="item-info">
            <div class="item-name">소파</div>
            <div class="item-size">2.0 × 0.9 × 0.8m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #666666;"></div>
          <div class="item-info">
            <div class="item-name">테이블</div>
            <div class="item-size">1.5 × 0.6 × 1.0m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #333333;"></div>
          <div class="item-info">
            <div class="item-name">책장</div>
            <div class="item-size">0.8 × 0.3 × 1.8m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: #999999;"></div>
          <div class="item-info">
            <div class="item-name">의자</div>
            <div class="item-size">0.5 × 0.5 × 0.9m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <span class="status-dot"></span>
      배치됨: 2 / 4
    </div>
    <div class="status-item status-warning">
      충돌 없음
    </div>
  </div>
</body>
</html>
