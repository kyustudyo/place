<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Place - Gradient Modern</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, #1a0533 0%, #2d1b69 25%, #1e3a5f 50%, #0d2137 100%);
    color: #E8E0F0;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    min-height: 56px;
  }
  .top-bar-left { display: flex; flex-direction: column; }
  .app-logo {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, #A78BFA, #60A5FA, #34D399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .app-subtitle {
    font-size: 11px;
    color: rgba(167, 139, 250, 0.6);
    font-weight: 400;
  }
  .top-bar-actions { display: flex; gap: 8px; }
  .btn-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #A78BFA;
    font-size: 16px;
    min-width: 44px;
    min-height: 44px;
    transition: all 0.3s;
  }
  .btn-icon:active {
    background: rgba(167, 139, 250, 0.15);
    border-color: rgba(167, 139, 250, 0.3);
  }

  .room-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }
  .room-container::before {
    content: '';
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .isometric-room {
    width: 300px;
    height: 260px;
    position: relative;
    transform-style: preserve-3d;
  }
  .floor {
    position: absolute;
    width: 240px;
    height: 240px;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) rotateX(60deg) rotateZ(45deg);
    background:
      linear-gradient(rgba(167,139,250,0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,165,250,0.12) 1px, transparent 1px);
    background-size: 30px 30px;
    background-color: rgba(255,255,255,0.03);
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 4px;
    box-shadow:
      0 10px 40px rgba(167,139,250,0.1),
      inset 0 0 30px rgba(167,139,250,0.05);
  }
  .wall-back {
    position: absolute;
    width: 170px;
    height: 120px;
    top: 10px;
    left: 0;
    transform: skewY(-30deg);
    transform-origin: bottom left;
    background: linear-gradient(180deg, rgba(167,139,250,0.08) 0%, rgba(96,165,250,0.04) 100%);
    border: 1px solid rgba(167,139,250,0.2);
    border-bottom: none;
  }
  .wall-back::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(167,139,250,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(167,139,250,0.05) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  .wall-right {
    position: absolute;
    width: 170px;
    height: 120px;
    top: 10px;
    right: 0;
    transform: skewY(30deg);
    transform-origin: bottom right;
    background: linear-gradient(180deg, rgba(96,165,250,0.06) 0%, rgba(52,211,153,0.03) 100%);
    border: 1px solid rgba(96,165,250,0.15);
    border-bottom: none;
  }
  .wall-right::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(96,165,250,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,165,250,0.04) 1px, transparent 1px);
    background-size: 30px 30px;
  }

  .placed-item {
    position: absolute;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .placed-sofa {
    width: 70px;
    height: 30px;
    background: linear-gradient(135deg, #A78BFA, #7C3AED);
    box-shadow: 0 4px 20px rgba(167,139,250,0.4);
    bottom: 70px;
    left: 70px;
    transform: rotateX(60deg) rotateZ(45deg);
  }
  .placed-table {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #60A5FA, #3B82F6);
    box-shadow: 0 4px 20px rgba(96,165,250,0.4);
    bottom: 85px;
    left: 155px;
    transform: rotateX(60deg) rotateZ(45deg);
  }

  .furniture-panel {
    background: rgba(255,255,255,0.04);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 14px 16px;
    flex-shrink: 0;
    max-height: 224px;
    overflow-y: auto;
  }
  .panel-title {
    font-size: 12px;
    font-weight: 600;
    color: rgba(167,139,250,0.7);
    letter-spacing: 1px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .furniture-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .furniture-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.06);
    min-height: 56px;
    transition: all 0.25s;
  }
  .furniture-item:active {
    background: rgba(167,139,250,0.1);
    border-color: rgba(167,139,250,0.2);
  }
  .color-swatch {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 15px;
    font-weight: 600;
    color: #FFFFFF;
  }
  .item-size {
    font-size: 12px;
    color: rgba(232,224,240,0.5);
    margin-top: 2px;
  }
  .item-actions { display: flex; gap: 6px; }
  .btn-sm {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 15px;
    color: rgba(167,139,250,0.8);
    min-width: 38px;
    min-height: 38px;
  }
  .btn-sm:active {
    background: rgba(167,139,250,0.15);
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    min-height: 44px;
  }
  .status-item {
    font-size: 12px;
    color: rgba(232,224,240,0.6);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: linear-gradient(135deg, #34D399, #60A5FA);
    box-shadow: 0 0 8px rgba(52,211,153,0.5);
  }
  .status-warning { color: #FBBF24; }

  @media (min-width: 768px) {
    .main-content { display: flex; flex: 1; min-height: 0; }
    .room-container { flex: 1; }
    .furniture-panel {
      width: 350px;
      border-top: none;
      border-left: 1px solid rgba(255,255,255,0.08);
      max-height: none;
    }
  }
</style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="app-logo">Place</div>
      <div class="app-subtitle">가구 배치 도구</div>
    </div>
    <div class="top-bar-actions">
      <button class="btn-icon" aria-label="붙여넣기">📋</button>
      <button class="btn-icon" aria-label="JSON 복사">{ }</button>
    </div>
  </div>

  <div class="main-content">
    <div class="room-container">
      <div class="isometric-room">
        <div class="wall-back"></div>
        <div class="wall-right"></div>
        <div class="floor"></div>
        <div class="placed-item placed-sofa">소파</div>
        <div class="placed-item placed-table">탁자</div>
      </div>
    </div>

    <div class="furniture-panel">
      <div class="panel-title">가구 목록</div>
      <div class="furniture-list">
        <div class="furniture-item">
          <div class="color-swatch" style="background: linear-gradient(135deg, #A78BFA, #7C3AED);"></div>
          <div class="item-info">
            <div class="item-name">소파</div>
            <div class="item-size">2.0 × 0.9 × 0.8m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: linear-gradient(135deg, #60A5FA, #3B82F6);"></div>
          <div class="item-info">
            <div class="item-name">테이블</div>
            <div class="item-size">1.5 × 0.6 × 1.0m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: linear-gradient(135deg, #F472B6, #EC4899);"></div>
          <div class="item-info">
            <div class="item-name">책장</div>
            <div class="item-size">0.8 × 0.3 × 1.8m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
        <div class="furniture-item">
          <div class="color-swatch" style="background: linear-gradient(135deg, #34D399, #10B981);"></div>
          <div class="item-info">
            <div class="item-name">의자</div>
            <div class="item-size">0.5 × 0.5 × 0.9m</div>
          </div>
          <div class="item-actions">
            <button class="btn-sm" aria-label="회전">↻</button>
            <button class="btn-sm" aria-label="삭제">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <span class="status-dot"></span>
      배치됨: 2 / 4
    </div>
    <div class="status-item status-warning">
      ⚠ 충돌 없음
    </div>
  </div>
</body>
</html>
